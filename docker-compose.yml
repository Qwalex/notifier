version: '3.8'

services:
  telegram-bot:
    build: .
    # Не монтируйте каталог проекта в /opt/app — затрёт node_modules из образа
    container_name: telegram-bot
    ports:
      - "5656:5656"
    environment:
      - NODE_ENV=production
      - PORT=5656
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - CHAT_ID=${CHAT_ID}
      - VK_ACCESS_TOKEN=${VK_ACCESS_TOKEN}
      - VK_PEER_ID=${VK_PEER_ID}
    volumes:
      - ./logs:/opt/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5656/?text=healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
