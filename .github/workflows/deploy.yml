# Два job: build (npm + образ в GHCR) и deploy (SSH + restart.sh).
# NOTIFY_URL — только успешный деплой; см. restart.sh.
#
# Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY | опционально GHCR_TOKEN
# Variables: DEPLOY_PATH (по умолчанию /root/notifier), NOTIFY_URL

name: CI and deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      repo_lower: ${{ steps.repo_lower.outputs.repo_lower }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install and syntax-check
        run: npm ci && node --check index.js

      - id: repo_lower
        run: echo "repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo_lower.outputs.repo_lower }}:latest
            ghcr.io/${{ steps.repo_lower.outputs.repo_lower }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          REMOTE_DIR: ${{ vars.DEPLOY_PATH || '/root/notifier' }}
          BRANCH: ${{ github.ref_name }}
          NOTIFIER_IMAGE: ghcr.io/${{ needs.build.outputs.repo_lower }}:${{ github.sha }}
          NOTIFY_URL: ${{ vars.NOTIFY_URL }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: REMOTE_DIR,BRANCH,NOTIFIER_IMAGE,NOTIFY_URL,GHCR_TOKEN,GHCR_USERNAME
          script_stop: true
          script: |
            set -eu
            cd "$REMOTE_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            export SKIP_GIT=1
            export DEPLOY_WRAPPER="github-actions deploy.yml"
            bash ./restart.sh
